name: Rebuild Assets

on:
  push:
    branches:
      - master
    paths:
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    if: github.repository_owner == 'karafka'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: sudo apt-get install -y brotli

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: bin/build_assets
        env:
          KARAFKA_RELEASE: 'true'

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Rebuild assets after dependency update"
          title: "Rebuild assets after dependency update"
          body: |
            This PR was automatically created to rebuild assets after a dependency update.

            Changes include rebuilt CSS and JavaScript bundles.
          branch: chore/rebuild-assets-${{ github.sha }}
          delete-branch: true
          labels: dependencies
